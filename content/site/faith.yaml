source: https://abidingplace.ca/our-faith/
editor_note: Faithfully edited for clarity from the church’s published ten-point statement.
  Do not substitute a generic denominational statement without approval.
beliefs:
- title: The Bible
  text: The Bible is the inspired, infallible and authoritative Word of God.
- title: The Triune God
  text: There is one God, eternally manifested as Father, Son and Holy Spirit.
- title: Jesus Christ
  text: Jesus Christ was born of a virgin, offered an atoning sacrifice through His
    shed blood, rose bodily, ascended and will return personally in power and glory.
- title: Salvation
  text: Regeneration and conversion through faith in Jesus Christ are essential for
    the salvation of lost and sinful humanity.
- title: Water Baptism
  text: Water baptism is not a saving ordinance, but is an essential act of obedience
    to the Gospel and should be administered by immersion.
- title: Life in Holy Spirit
  text: The Gospel includes holiness of heart and life, healing of the body and a
    personal experience with Holy Spirit through which spiritual gifts become active
    in believers.
- title: Resurrection and Judgment
  text: There will be a bodily resurrection and final judgment of all humanity.
- title: Unity of Believers
  text: All believers are spiritually united in the Lord Jesus Christ.
- title: Spiritual Gifts and Ministry
  text: The gifts of Holy Spirit and the five-fold ministry equip the saints and build
    up the body of Christ.
- title: Marriage
  text: Marriage is holy and ordained by God as a covenant union of one man and one
    woman.
