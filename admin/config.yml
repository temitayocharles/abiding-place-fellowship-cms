# Decap CMS Configuration — Abiding Place Fellowship
# Simplified for pastors and non-technical users 💚

backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://abiding-place-ministries-cms.netlify.app"
display_url: "https://abiding-place-ministries-cms.netlify.app"

publish_mode: editorial_workflow

commit_messages:
  create: "✨ Create {{collection}} — {{slug}}"
  update: "📝 Update {{collection}} — {{slug}}"
  delete: "🗑️ Delete {{collection}} — {{slug}}"
  uploadMedia: "📸 Upload media — {{path}}"
  deleteMedia: "🗑️ Delete media — {{path}}"

collections:
  # ─────────────────────────────────────────────
  # 1. Leadership Team
  # ─────────────────────────────────────────────
  - name: "leadership"
    label: "Leadership"
    label_singular: "Leader"
    folder: "content/team"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    fields:
      - { name: "name", label: "Name", widget: "string", required: true }
      - { name: "role", label: "Role", widget: "string", required: true }
      - { name: "bio", label: "Bio", widget: "text", required: true }
      - { name: "photo", label: "Photo", widget: "image", required: false }
      - { name: "display_order", label: "Display Order", widget: "number", required: false, default: 99 }

  # ─────────────────────────────────────────────
  # 2. Events
  # ─────────────────────────────────────────────
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { name: "title", label: "Event Title", widget: "string", required: true }
      - { name: "date", label: "Date & Time", widget: "datetime", required: true }
      - { name: "location", label: "Location", widget: "string", required: true }
      - { name: "description", label: "Description", widget: "text", required: true }
      - { name: "featured_image", label: "Featured Image", widget: "image", required: false }

  # ─────────────────────────────────────────────
  # 3. Ministries
  # ─────────────────────────────────────────────
  - name: "ministries"
    label: "Ministries"
    label_singular: "Ministry"
    folder: "content/ministries"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} — {{leader}}"
    fields:
      - { name: "name", label: "Ministry Name", widget: "string", required: true }
      - { name: "leader", label: "Leader", widget: "string", required: true }
      - { name: "description", label: "Description", widget: "text", required: true }
      - name: "meeting_day"
        label: "Meeting Day"
        widget: "select"
        required: false
        options:
          - { label: "Sunday", value: "Sunday" }
          - { label: "Tuesday", value: "Tuesday" }
          - { label: "Wednesday", value: "Wednesday" }
          - { label: "Other", value: "Other" }
        default: "Sunday"
      - { name: "meeting_time", label: "Meeting Time", widget: "string", required: false }
      - { name: "photo", label: "Photo", widget: "image", required: false }
      - { name: "is_active", label: "Is Active", widget: "boolean", required: false, default: true }

  # ─────────────────────────────────────────────
  # 4. Contact Info (single file)
  # ─────────────────────────────────────────────
  - name: "contact_info"
    label: "Contact Info"
    delete: false
    editor:
      preview: false
    files:
      - name: "contact"
        label: "Contact Info"
        file: "config/contact.yaml"
        fields:
          - { name: "phone", label: "Phone", widget: "string", required: true }
          - { name: "mobile_phone", label: "Mobile Phone", widget: "string", required: false }
          - { name: "email", label: "Email", widget: "string", required: true }
          - { name: "address", label: "Address", widget: "string", required: true }
          - name: "service_times"
            label: "Service Times"
            widget: "list"
            summary: "{{day}} — {{time}}"
            fields:
              - { name: "day", label: "Day", widget: "string", required: true }
              - { name: "time", label: "Time", widget: "string", required: true }
              - { name: "type", label: "Type", widget: "string", required: true }
