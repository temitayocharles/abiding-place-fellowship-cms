backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Add [{{collection}}] {{slug}}"
    update: "Update [{{collection}}] {{slug}}"
    delete: "Delete [{{collection}}] {{slug}}"
    upload_media: "Upload media: {{path}}"
    delete_media: "Delete media: {{path}}"

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_settings"
    label: "📋 Site Settings"
    files:
      - name: "site"
        label: "Site Identity"
        file: "config/site.yaml"
        fields:
          - {label: "Public name", name: "name", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Founded year", name: "founded", widget: "number", value_type: "int", required: false}
          - {label: "Legacy site URL", name: "official_legacy_site", widget: "string", required: false}
          - {label: "Contact email", name: "email", widget: "string"}

      - name: "contact"
        label: "Contact & Times"
        file: "config/contact.yaml"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Cell", name: "cell", widget: "string", required: false}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Venue name", name: "venue", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Entrance instructions", name: "entrance", widget: "text", required: false}
          - label: "Service times"
            name: "service_times"
            widget: "list"
            fields:
              - {label: "Day", name: "day", widget: "string"}
              - {label: "Time", name: "time", widget: "string"}
              - {label: "Name/Type", name: "name", widget: "string", required: false}
          - {label: "Editor notes", name: "editor_notes", widget: "text", required: false}

  - name: "team"
    label: "👥 Leadership Team"
    folder: "content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Full name", name: "name", widget: "string"}
      - {label: "Role/Title", name: "role", widget: "string"}
      - {label: "Biography", name: "bio", widget: "text", required: false}
      - label: "Color theme"
        name: "color"
        widget: "select"
        options:
          - label: "Blue"
            value: "#2563EB"
          - label: "Green"
            value: "#059669"
          - label: "Orange"
            value: "#D97706"
      - {label: "Verified", name: "verified", widget: "boolean", default: false, required: false}
      - {label: "Photo file (upload to /assets/uploads/)", name: "photo", widget: "image", required: false}

  - name: "events"
    label: "📅 Events & Services"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Event title", name: "title", widget: "string"}
      - {label: "Date/Time", name: "date", widget: "string"}
      - {label: "Location", name: "location", widget: "string", required: false}
      - {label: "Description", name: "description", widget: "text"}
      - label: "Color theme"
        name: "color"
        widget: "select"
        options:
          - label: "Blue"
            value: "#2563EB"
          - label: "Green"
            value: "#059669"
          - label: "Orange"
            value: "#D97706"
      - {label: "Show on homepage", name: "show_on_home", widget: "boolean", default: true}
      - {label: "Verified source", name: "verified", widget: "boolean", default: false, required: false}

  - name: "ministries"
    label: "🏛️ Ministries"
    folder: "content/ministries"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ministry name", name: "name", widget: "string"}
      - {label: "Target group/age", name: "group", widget: "string", required: false}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Icon/Emoji", name: "icon", widget: "string", required: false, hint: "Optional emoji like 👶 👦 👩‍🦳"}
      - label: "Color theme"
        name: "color"
        widget: "select"
        options:
          - label: "Blue"
            value: "#2563EB"
          - label: "Green"
            value: "#059669"
          - label: "Orange"
            value: "#D97706"
      - {label: "Verified source", name: "verified", widget: "boolean", default: false, required: false}