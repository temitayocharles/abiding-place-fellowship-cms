backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    folder: "config"
    create: true
    files:
      - name: "contact"
        label: "Contact Information"
        file: "config/contact.yaml"
        fields:
          - {label: Phone, name: phone, widget: string}
          - {label: Cell, name: cell, widget: string}
          - {label: Email, name: email, widget: string}
          - {label: Address, name: address, widget: string}
          - label: "Service Times"
            name: service_times
            widget: list
            fields:
              - {label: Day, name: day, widget: string}
              - {label: Time, name: time, widget: string}

  - name: "team"
    label: "Leadership Team"
    folder: "content/team"
    create: true
    fields:
      - {label: Name, name: name, widget: string}
      - {label: Role, name: role, widget: string}
      - {label: Bio, name: bio, widget: text}
      - {label: Photo Initials, name: initials, widget: string}
      - label: "Color Theme"
        name: color
        widget: select
        options:
          - label: "Primary Blue"
            value: "#2563EB"
          - label: "Secondary Green"
            value: "#059669"
          - label: "Accent Orange"
            value: "#D97706"

  - name: "events"
    label: "Events & Services"
    folder: "content/events"
    create: true
    editor:
      preview: false
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date/Time, name: date, widget: string}
      - {label: Location, name: location, widget: string}
      - {label: Description, name: description, widget: text}
      - label: "Color Theme"
        name: color
        widget: select
        options:
          - label: "Primary Blue"
            value: "#2563EB"
          - label: "Secondary Green"
            value: "#059669"
          - label: "Accent Orange"
            value: "#D97706"
      - {label: Show on Home Page, name: show_on_home, widget: boolean, default: true}

  - name: "ministries"
    label: "Ministries"
    folder: "content/ministries"
    create: true
    fields:
      - {label: Name, name: name, widget: string}
      - {label: Age/Grade Group, name: group, widget: string}
      - {label: Description, name: description, widget: text}
      - {label: Icon, name: icon, widget: string}